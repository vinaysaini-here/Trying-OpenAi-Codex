<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-shell" aria-label="Snake game">
        <header class="game-header">
          <div>
            <h1>Snake</h1>
            <p class="subtitle">Classic grid snake with restart and pause.</p>
          </div>
          <div class="scoreboard" aria-live="polite">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
        </header>

        <div class="status-row">
          <p id="status">Press any arrow key or WASD to start.</p>
          <div class="actions">
            <button id="pause-button" type="button">Pause</button>
            <button id="restart-button" type="button">Restart</button>
          </div>
        </div>

        <div
          id="board"
          class="board"
          role="grid"
          aria-label="Snake board"
        ></div>

        <div class="controls" aria-label="Touch controls">
          <button class="control-button" type="button" data-direction="up">Up</button>
          <div class="control-row">
            <button class="control-button" type="button" data-direction="left">Left</button>
            <button class="control-button" type="button" data-direction="down">Down</button>
            <button class="control-button" type="button" data-direction="right">Right</button>
          </div>
        </div>

        <p class="help">Controls: Arrow keys or WASD. Space toggles pause.</p>
      </section>
    </main>

    <script type="module" src="./src/game.js"></script>
  </body>
</html>
